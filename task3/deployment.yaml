apiVersion: apps/v1
kind: Deployment
metadata:
  name: exam-app
  namespace: __NAMESPACE__
spec:
  replicas: 1
  selector:
    matchLabels:
      app: exam-app
  template:
    metadata:
      labels:
        app: exam-app
    spec:
      containers:
      - name: app
        image: __IMAGE__
        ports:
        - containerPort: 8000 
---
apiVersion: v1
kind: Service
metadata:
  name: exam-app-svc
  namespace: __NAMESPACE__
spec:
  selector:
    app: exam-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000

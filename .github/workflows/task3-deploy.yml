name: Task 3 - Deploy App
on:
  workflow_dispatch:
    inputs:
      target_ip:
        description: 'IP адреса віртуальної машини '
        required: true
      environment:
        description: 'Оберіть середовище для розгортання'
        required: true
        type: choice
        options:
          - dev
          - release

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Exam Repo
        uses: actions/checkout@v3

      - name: Checkout App Repo
        run: git clone https://github.com/YulianSalo/devops-exam-pt2.git app-src

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          cd app-src
          if [ "${{ github.event.inputs.environment }}" == "dev" ]; then
            git checkout develop
            TAG="develop"
            NAMESPACE="holdii-dev"
            HOST_PORT="8002"
          else
            git checkout 1.0.0
            TAG="1.0.0"
            NAMESPACE="holdii-release"
            HOST_PORT="8003"
          fi
          
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/exam-app:$TAG"
          docker build -t $IMAGE .
          docker push $IMAGE
          
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV
          echo "NAMESPACE=$NAMESPACE" >> $GITHUB_ENV
          echo "HOST_PORT=$HOST_PORT" >> $GITHUB_ENV

      - name: Prepare Manifests
        run: |
          sed -i "s|__IMAGE__|${{ env.IMAGE }}|g" task3/deployment.yaml
          sed -i "s|__NAMESPACE__|${{ env.NAMESPACE }}|g" task3/deployment.yaml

      - name: Copy Manifests to VM
        uses: appleboy/scp-action@master
        with:
          host: ${{ github.event.inputs.target_ip }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "task3/deployment.yaml"
          target: "/root/"

      - name: Deploy to Kubernetes & Port-Forward
        uses: appleboy/ssh-action@master
        with:
          host: ${{ github.event.inputs.target_ip }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: NAMESPACE, HOST_PORT
          script: |
            export PATH=$PATH:/usr/local/bin

            # Створення namespace
            kubectl create namespace $NAMESPACE --dry-run=client -o yaml | kubectl apply -f -

            kubectl apply -f /root/task3/deployment.yaml --dry-run=client

            kubectl apply -f /root/task3/deployment.yaml

            fuser -k $HOST_PORT/tcp || true

            nohup kubectl port-forward svc/exam-app-svc $HOST_PORT:80 -n $NAMESPACE --address 0.0.0.0 > /dev/null 2>&1 &
